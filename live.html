    <span class="topbar-title">LIVE</span>

  <!-- ── Mobile Overlay ────────────────────────────────── -->
  <div id="nav-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Navigation menu">

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- MAIN                                                -->

  <main id="main-content">

    <!-- ── Current Live Section ──────────────────────── -->
    <div class="live-page">

      <div class="page-header" style="padding:40px 36px 24px;">
        <h1 class="page-title">📡 Live</h1>
        <!-- live status (Online/Offline badge) injected here -->
        <div id="live-status">
          <div class="spinner-wrap" style="padding:12px 0;justify-content:flex-start;">
            <div class="spinner" style="width:24px;height:24px;"></div>
          </div>
        </div>
      </div>

      <!-- Player or offline card injected here -->
      <div id="live-player-wrap" style="padding:0 36px 36px;">
        <!-- filled by JS -->
      </div>

      <!-- ── Divider ──────────────────────────────────── -->
      <div class="section-label" style="padding-top:8px;">
        &#128247; Past Live Streams
        <span id="past-lives-count" style="font-family:var(--font-mono);font-size:.7rem;color:var(--text-muted);letter-spacing:.04em;"></span>
      </div>

      <!-- Past lives grid -->
      <section id="past-lives-grid" class="videos-grid" aria-label="Past live streams">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </section>

      <!-- Load more for past lives -->
      <div class="load-more-wrap">
        <button id="past-lives-load-more" class="btn-load-more" style="display:none;">Load More</button>
      </div>

    </div>
