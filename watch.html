  <nav id="sidebar" aria-label="Main navigation">
    <div class="sidebar-header">
      <img src="assets/logo.png" alt="Mr. Si!ent logo" class="sidebar-logo" />
      <span class="sidebar-title">Mr. Si!ent</span>
    </div>
    <div class="sidebar-nav">
      <a href="index.html"     class="nav-link"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>

    </div>
  </nav>

  <!-- ── Mobile Topbar ─────────────────────────────────── -->
  <div id="topbar" role="banner">
    <button id="hamburger" aria-label="Open navigation" aria-expanded="false" aria-controls="nav-overlay">&#9776;</button>
    <span class="topbar-title">WATCH</span>
    <span style="width:40px"></span>
  </div>

  <!-- ── Mobile Overlay ────────────────────────────────── -->
  <div id="nav-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <div id="sidebar-mobile">
      <div class="sidebar-header" style="justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <img src="assets/logo.png" alt="Mr. Si!ent logo" class="sidebar-logo" />
          <span class="sidebar-title">Mr. Si!ent</span>
        </div>
        <button id="nav-close" aria-label="Close navigation" style="background:none;border:none;color:var(--cyan);font-size:1.4rem;cursor:pointer;padding:4px 8px;">&#x2715;</button>
      </div>
      <div class="sidebar-nav">
        <a href="index.html"     class="nav-link"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
        <a href="videos.html"    class="nav-link active"><span class="nav-icon">▶️</span><span class="nav-label">Videos</span></a>

  <!-- ── Main Content ──────────────────────────────────── -->
  <main id="main-content">
    <div class="watch-layout">

      <!-- Player + Info -->
      <div class="watch-main">
        <div class="responsive-embed" id="watch-player">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>

        <h1 class="watch-title" id="watch-title">Loading…</h1>
        <div class="watch-meta"  id="watch-meta"></div>

        <!-- ❤️ 👁️ 💬 stat pills -->
        <div class="watch-stats" id="watch-stats"></div>

        <a href="videos.html"
           style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);text-decoration:none;font-size:.9rem;margin-top:8px;transition:color .2s"
           onmouseover="this.style.color='var(--cyan)'" onmouseout="this.style.color='var(--text-secondary)'">
          &#8592; Back to Videos
        </a>
      </div>

      <!-- Up Next -->
      <aside aria-label="Up next">
        <div class="up-next-label">Up Next</div>
        <div id="up-next-list" class="up-next-list">
          <div class="spinner-wrap" style="padding:20px"><div class="spinner"></div></div>
        </div>
      </aside>

    </div>

  <script>window.CHANNEL_ID = 'UCKQ_q75TKeAcYXYeu0uaWlQ';</script>
  <script src="js/protect.js"></script>
  <script src="js/script.js"></script>

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js'); });
