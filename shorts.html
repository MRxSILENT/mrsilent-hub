<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Shorts — Mr. Si!ent Creator Hub</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/logo.png" type="image/png" />
</head>
<body>

  <!-- ── Sidebar ───────────────────────────────────────── -->
  <nav id="sidebar" aria-label="Main navigation">
    <div class="sidebar-header">
      <img src="assets/logo.png" alt="Mr. Si!ent logo" class="sidebar-logo" />
      <span class="sidebar-title">Mr. Si!ent</span>
    </div>
    <div class="sidebar-nav">
      <a href="index.html"     class="nav-link"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
      <a href="videos.html"    class="nav-link"><span class="nav-icon">▶️</span><span class="nav-label">Videos</span></a>
      <a href="live.html"      class="nav-link"><span class="nav-icon">📡</span><span class="nav-label">Live</span></a>
      <a href="shorts.html"    class="nav-link active" aria-current="page"><span class="nav-icon">⚡</span><span class="nav-label">Shorts</span></a>
      <a href="playlists.html" class="nav-link"><span class="nav-icon">📂</span><span class="nav-label">Playlists</span></a>
      <a href="about.html"     class="nav-link"><span class="nav-icon">👤</span><span class="nav-label">About</span></a>
    </div>
  </nav>

  <!-- ── Mobile Topbar ─────────────────────────────────── -->
  <div id="topbar" role="banner">
    <button id="hamburger" aria-label="Open navigation" aria-expanded="false" aria-controls="nav-overlay">&#9776;</button>
    <span class="topbar-title">SHORTS</span>
    <span style="width:40px"></span>
  </div>

  <!-- ── Mobile Overlay ────────────────────────────────── -->
  <div id="nav-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Navigation menu">
    <div id="sidebar-mobile">
      <div class="sidebar-header" style="justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <img src="assets/logo.png" alt="Mr. Si!ent logo" class="sidebar-logo" />
          <span class="sidebar-title">Mr. Si!ent</span>
        </div>
        <button id="nav-close" aria-label="Close navigation"
          style="background:none;border:none;color:var(--cyan);font-size:1.4rem;cursor:pointer;padding:4px 8px;">&#x2715;</button>
      </div>
      <div class="sidebar-nav">
        <a href="index.html"     class="nav-link"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
        <a href="videos.html"    class="nav-link"><span class="nav-icon">▶️</span><span class="nav-label">Videos</span></a>
        <a href="live.html"      class="nav-link"><span class="nav-icon">📡</span><span class="nav-label">Live</span></a>
        <a href="shorts.html"    class="nav-link active"><span class="nav-icon">⚡</span><span class="nav-label">Shorts</span></a>
        <a href="playlists.html" class="nav-link"><span class="nav-icon">📂</span><span class="nav-label">Playlists</span></a>
        <a href="about.html"     class="nav-link"><span class="nav-icon">👤</span><span class="nav-label">About</span></a>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- MAIN                                                -->
  <!-- ═══════════════════════════════════════════════════ -->
  <main id="main-content">

    <div class="page-header">
      <h1 class="page-title">⚡ Shorts</h1>
      <p class="page-subtitle">
        Click any short to watch &nbsp;·&nbsp;
        <span id="shorts-count" style="color:var(--cyan);font-family:var(--font-mono);"></span>
      </p>
    </div>

    <!-- Loading spinner -->
    <div id="shorts-loading" class="spinner-wrap">
      <div class="spinner"></div>
    </div>

    <!-- Empty state (hidden until needed) -->
    <div id="shorts-empty" class="empty-state" style="display:none;">
      <div class="empty-icon">⚡</div>
      No Shorts found on this channel yet.
    </div>

    <!-- ── Shorts grid — identical layout to videos page ─ -->
    <section id="shorts-grid" class="videos-grid" aria-label="Shorts"></section>

  </main>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- MODAL PLAYER                                        -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div id="short-modal" class="short-modal" role="dialog" aria-modal="true"
       aria-label="Short player" aria-hidden="true">
    <button id="short-modal-close" class="short-modal-close" aria-label="Close">&#x2715;</button>

    <div class="short-modal-inner">

      <!-- 9:16 video player -->
      <div id="short-modal-player" class="short-modal-player"></div>

      <!-- Info panel -->
      <div class="short-modal-info">
        <h2 id="short-modal-title" class="short-modal-title"></h2>

        <div id="short-modal-stats" class="short-modal-stats watch-stats"></div>

        <button id="short-modal-like" class="modal-like-btn" aria-pressed="false"
                data-vid="">
          <span>&#9825;</span> Like
        </button>

        <a id="short-modal-yt" href="#" target="_blank" rel="noopener noreferrer"
           class="short-modal-yt-link">
          ▶ Open on YouTube
        </a>

        <div class="short-modal-nav">
          <button id="short-modal-prev" class="short-modal-nav-btn"
                  aria-label="Previous short">&#8592; Prev</button>
          <button id="short-modal-next" class="short-modal-nav-btn"
                  aria-label="Next short">Next &#8594;</button>
        </div>

        <p style="font-family:var(--font-mono);font-size:.72rem;color:var(--text-muted);margin-top:8px;">
          &#8592; &#8594; Arrow keys &nbsp;·&nbsp; Esc to close
        </p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SCRIPTS                                             -->
  <!-- ═══════════════════════════════════════════════════ -->
  <script>window.CHANNEL_ID = 'UCKQ_q75TKeAcYXYeu0uaWlQ';</script>
  <script src="js/protect.js"></script>
  <script src="js/script.js"></script>
  <script src="js/shorts.js"></script>
  <script>
    // Keep YouTube link in sync with currently playing short
    (function () {
      var likeBtn = document.getElementById('short-modal-like');
      var ytLink  = document.getElementById('short-modal-yt');
      if (likeBtn && ytLink) {
        new MutationObserver(function () {
          var vid = likeBtn.getAttribute('data-vid');
          if (vid) ytLink.href = 'https://www.youtube.com/shorts/' + vid;
        }).observe(likeBtn, { attributes: true, attributeFilter: ['data-vid'] });
      }
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js');
        });
      }
    })();
  </script>
</body>
</html>
