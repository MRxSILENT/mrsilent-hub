      body { overflow: auto; }
      #main-content { height:auto; overflow:visible; }
      .shorts-list { width:100%;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;overflow-x:auto;overflow-y:hidden;max-height:160px;padding:10px 12px;gap:10px; }
      .short-item { width:90px;flex-shrink:0;max-height:none;aspect-ratio:9/16;height:140px; }
      .shorts-viewer { min-height:60vh;flex:1; }
    }
  </style>
</head>
<body>

  <div id="nav-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Navigation menu">

      <div class="sidebar-header" style="justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <img src="assets/logo.png" alt="Mr. Si!ent logo" class="sidebar-logo" />

      <div id="shorts-list" class="shorts-list" aria-label="Shorts list"></div>
      <div id="shorts-viewer" class="shorts-viewer">
        <div id="shorts-loading" class="spinner-wrap" style="position:absolute;"><div class="spinner"></div></div>
        <div id="shorts-empty" class="shorts-empty" style="display:none;" aria-live="polite">
          <div class="empty-icon">&#9889;</div>No Shorts found on this channel yet.
        </div>
        <div id="shorts-player" class="shorts-player" aria-label="Shorts player"></div>
